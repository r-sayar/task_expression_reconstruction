name: process_datasets
namespace: workflows

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        __merge__: /src/api/file_common_dataset.yaml
        type: file
        direction: input
        required: true
  - name: Outputs
    arguments:
      - name: "--output_train"
        __merge__: /src/api/file_train.yaml
        type: file
        direction: output
        required: true
      - name: "--output_test"
        __merge__: /src/api/file_test.yaml
        type: file
        direction: output
        required: true
      - name: "--output_solution"
        __merge__: /src/api/file_solution.yaml
        type: file
        direction: output
        required: true

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - type: file
    path: /_viash.yaml

dependencies:
  - name: data_processors/process_dataset

runners:
  - type: nextflow

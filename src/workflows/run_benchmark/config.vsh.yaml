name: run_benchmark
namespace: workflows

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input_train"
        __merge__: /src/api/file_train.yaml
        type: file
        direction: input
        required: true
      - name: "--input_test"
        __merge__: /src/api/file_test.yaml
        type: file
        direction: input
        required: true
      - name: "--input_solution"
        __merge__: /src/api/file_solution.yaml
        type: file
        direction: input
        required: true
  - name: Outputs
    arguments:
      - name: "--output_scores"
        type: file
        required: true
        direction: output
        description: YAML file containing metric scores per method
        default: score_uns.yaml
      - name: "--output_method_configs"
        type: file
        required: true
        direction: output
        default: method_configs.yaml
      - name: "--output_metric_configs"
        type: file
        required: true
        direction: output
        default: metric_configs.yaml
      - name: "--output_dataset_info"
        type: file
        required: true
        direction: output
        default: dataset_uns.yaml
      - name: "--output_task_info"
        type: file
        required: true
        direction: output
        default: task_info.yaml
  - name: Methods
    arguments:
      - name: "--method_ids"
        type: string
        multiple: true
        description: Method ids to run (default all).

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - type: file
    path: /_viash.yaml

dependencies:
  - name: utils/extract_uns_metadata
    repository: openproblems
  - name: control_methods/ground_truth
  - name: methods/pca_reconstruction
  - name: methods/autoencoder
  - name: methods/scvi
  - name: metrics/statistical

runners:
  - type: nextflow

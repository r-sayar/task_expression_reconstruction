type: file
example: "resources_test/common/luca/dataset.h5ad"
label: "Common Dataset"
summary: Raw or preprocessed LuCA expression data.
info:
  format:
    type: h5ad
    obs:
      - type: string
        name: cell_type
        description: Cell type annotation
        required: false
      - type: string
        name: dataset
        description: Study / dataset identifier within LuCA
        required: false
      - type: string
        name: origin
        description: Tissue origin (e.g. tumor_primary, normal_adjacent)
        required: false
    uns:
      - type: string
        name: dataset_id
        description: Unique dataset identifier
        required: true
      - type: string
        name: dataset_name
        description: Human-readable dataset name
        required: true
      - type: string
        name: normalization_id
        description: Normalization applied to .X
        required: true

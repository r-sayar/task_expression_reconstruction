__merge__: ../../api/comp_metric.yaml
name: statistical
info:
  metrics:
    - name: r2
      label: Gene-sum R²
      summary: R² between gene-wise summed expression across cells.
      description: |
        Coefficient of determination computed on the per-gene sum of expression
        across all cells in the solution and prediction matrices.
      min: -inf
      max: 1
      maximize: true
      references:
        bibtex: |
          @article{Fu2026.06.15.731445,
            author = {Fu, Xiaotong and Klein, Dominik and Antipov, Egor and others},
            title = {Benchmarking gene expression reconstruction from single-cell latent representations},
            year = {2026},
            doi = {10.64898/2026.06.15.731445},
            journal = {bioRxiv}
          }
      links:
        documentation: https://reconeval.readthedocs.io

    - name: mse
      label: Mean squared error
      summary: Cell-wise mean squared error between matched cells.
      description: |
        Mean squared error between solution and prediction expression matrices.
        Requires the same number of cells in both inputs (matched ``obs_names``).
      min: 0
      max: inf
      maximize: false
      references:
        bibtex: |
          @article{Fu2026.06.15.731445,
            author = {Fu, Xiaotong and Klein, Dominik and Antipov, Egor and others},
            title = {Benchmarking gene expression reconstruction from single-cell latent representations},
            year = {2026},
            doi = {10.64898/2026.06.15.731445},
            journal = {bioRxiv}
          }
      links:
        documentation: https://reconeval.readthedocs.io

    - name: energy_distance
      label: Energy distance
      summary: Multivariate energy distance between cell distributions.
      description: |
        Energy distance between the empirical distributions of cells in
        solution and prediction expression space.
      min: 0
      max: inf
      maximize: false
      references:
        bibtex: |
          @article{szekely:13,
            author = {Sz\'ekely, G\'abor J. and Rizzo, Maria L.},
            title = {Energy statistics: A class of statistics based on distances},
            journal = {Journal of Statistical Planning and Inference},
            volume = {143},
            number = {8},
            pages = {1249--1272},
            year = {2013}
          }
      links:
        documentation: https://reconeval.readthedocs.io

resources:
  - type: python_script
    path: script.py
  - type: file
    path: ../../common/openproblems_utils.py

engines:
  - type: docker
    image: openproblems/base_python:1
    setup:
      - type: python
        pip:
          - git+https://github.com/theislab/ReconEval.git

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [midtime, midmem, midcpu]

name: Render README

# Regenerates README.md from the task API (src/api) using the OpenProblems
# `create_task_readme` tool and commits the result back to main. This is what
# keeps README.md in sync with the API — it is otherwise a manual step
# (`scripts/create_readme.sh`).

on:
  push:
    branches: [ main ]
    paths:
      - 'src/api/**'
      - '_viash.yaml'
      - 'scripts/create_readme.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render_readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: viash-io/viash-actions/setup@v6

      # create_task_readme renders via a containerized (R-based) tool; the
      # ubuntu-latest runner has Docker preinstalled, which it needs.
      - name: Render README from src/api
        run: scripts/create_readme.sh

      - name: Commit regenerated README (if changed)
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md is already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: regenerate README from src/api [skip ci]"
            git push
          fi
